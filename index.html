function exportData() {
  const data = JSON.stringify({ customers: state.customers, reservations: state.reservations, hallSlots: state.hallSlots }, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `heubestellung_${new Date().toISOString().slice(0,10)}.json`;
  a.click(); URL.revokeObjectURL(url); showToast('Daten exportiert');
}
function importData() { document.getElementById('importFileInput').click(); }
function handleImport(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.customers) throw new Error('Ungültiges Format');
      state.customers = (data.customers || []).map(c => { if (!c.location) c.location = ''; if (c.deliveryCost === undefined) c.deliveryCost = 0; return c; });
      state.reservations = (data.reservations || []).map(r => { if (!r.year) r.year = CURRENT_YEAR; return r; });
      state.hallSlots = data.hallSlots || {};
      state.currentCustomerId = null;
      saveData(); renderAll(); showToast('Daten importiert');
    } catch(err) { showToast('Fehler: ' + err.message); }
  };
  reader.readAsText(file);
  event.target.value = '';
}
function restoreBackup() {
  try {
    const raw = localStorage.getItem('heubestellung_backup');
    if (!raw) { showToast('Keine Sicherung vorhanden'); return; }
    const data = JSON.parse(raw);
    if (!data.customers) throw new Error('Ungültig');
    state.customers = (data.customers || []).map(c => { if (!c.location) c.location = ''; if (c.deliveryCost === undefined) c.deliveryCost = 0; return c; });
    state.reservations = (data.reservations || []).map(r => { if (!r.year) r.year = CURRENT_YEAR; return r; });
    state.hallSlots = data.hallSlots || {};
    state.currentCustomerId = null;
    saveData(); renderAll(); showToast('Sicherung wiederhergestellt');
  } catch(e) { showToast('Fehler: ' + e.message); }
}

function importReservationsOnly() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!data.reservations) throw new Error('Keine Reservierungen in Datei');
        const existingIds = new Set(state.reservations.map(r => r.id));
        let count = 0;
        data.reservations.forEach(r => {
          if (!existingIds.has(r.id)) {
            if (!r.year) r.year = CURRENT_YEAR;
            state.reservations.push(r);
            count++;
          }
        });
        saveData(); renderAll();
        showToast(count + ' neue Reservierungen importiert');
      } catch(err) { showToast('Fehler: ' + err.message); }
    };
    reader.readAsText(file);
  };
  input.click();
}

// ============ BACKUP-ORDNER (File System Access API) ============
let backupHandle = null;

function openCfgDB() {
  return new Promise((resolve, reject) => {
    const r = indexedDB.open('heubestellung_cfg', 1);
    r.onupgradeneeded = () => { if (!r.result.objectStoreNames.contains('kv')) r.result.createObjectStore('kv'); };
    r.onsuccess = () => resolve(r.result);
    r.onerror = () => reject(r.error);
  });
}
async function loadBackupHandle() {
  try { const db = await openCfgDB(); return new Promise((res, rej) => { const tx = db.transaction('kv','readonly'); const r = tx.objectStore('kv').get('backupDir'); r.onsuccess = () => { res(r.result || null); db.close(); }; r.onerror = () => { rej(r.error); db.close(); }; }); } catch(e) { return null; }
}
async function saveBackupHandle(h) {
  try { const db = await openCfgDB(); return new Promise((res, rej) => { const tx = db.transaction('kv','readwrite'); const r = tx.objectStore('kv').put(h, 'backupDir'); r.onsuccess = () => { res(); db.close(); }; r.onerror = () => { rej(r.error); db.close(); }; }); } catch(e) {}
}
async function setBackupFolder() {
  try {
    const h = await window.showDirectoryPicker({ mode: 'readwrite' });
    backupHandle = h; await saveBackupHandle(h);
    showToast('Backup-Ordner gesetzt'); renderSidebar();
  } catch(e) { if (e.name !== 'AbortError') showToast('Fehler'); }
}
async function exportToBackupFolder() {
  if (!window.showDirectoryPicker) {
    const jsonData = JSON.stringify({customers:state.customers,reservations:state.reservations,fields:state.fields,workLogs:state.workLogs,harvests:state.harvests,hallSlots:state.hallSlots}, null, 2);
    const bytes = new TextEncoder().encode(jsonData);
    let bin = '';
    for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
    const b64 = btoa(bin);
    const backupDir = 'C:\\Users\\cbese\\Desktop\\heubestellung\\Backup Dateien';
    const psCmd = `powershell -ExecutionPolicy Bypass -Command "$b64='${b64}';$bytes=[System.Convert]::FromBase64String($b64);$json=[System.Text.Encoding]::UTF8.GetString($bytes);$dir='${backupDir}';if(!(Test-Path $dir -ErrorAction SilentlyContinue)){New-Item -ItemType Directory -Path $dir -Force};$file=Join-Path $dir ('heubestellung_'+((Get-Date).ToString('yyyy-MM-dd'))+'.json');[System.IO.File]::WriteAllText($file,$json);Write-Host ('Gespeichert: '+$file);Read-Host 'Druecke Enter'"`;
    const blob = new Blob(['@echo off\r\nchcp 65001 >nul\r\n' + psCmd], {type:'application/bat'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `Heu-Export_${new Date().toISOString().slice(0,10)}.bat`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    localStorage.setItem('heubestellung_export_ver', String(_dataVersion));
    showToast('Batch-Datei erstellt → speichern und doppelklicken');
    renderSidebar();
    return;
  }
  if (!backupHandle) {
    try {
      const h = await window.showDirectoryPicker({ mode: 'readwrite' });
      backupHandle = h; await saveBackupHandle(h);
      renderSidebar();
    } catch(e) { if (e.name !== 'AbortError') showToast('Ordner-Auswahl fehlgeschlagen'); return; }
  }
  if (backupHandle) {
    try {
      if ((await backupHandle.queryPermission({mode:'readwrite'})) !== 'granted')
        await backupHandle.requestPermission({mode:'readwrite'});
    } catch(e) {}
  }
  try {
    await saveBackupToFolder();
    localStorage.setItem('heubestellung_export_ver', String(_dataVersion));
    showToast('Exportiert: Backup Dateien');
    renderSidebar();
  } catch(e) {
    exportData();
    showToast('Ordner-Export fehlgeschlagen – Datei wurde heruntergeladen');
  }
}
async function saveBackupToFolder() {
  if (!backupHandle) throw new Error('Kein Backup-Ordner');
  const perm = await backupHandle.queryPermission({mode:'readwrite'});
  if (perm !== 'granted') throw new Error('Berechtigung fehlt – bitte 1× "Exportieren" klicken');
  const fh = await backupHandle.getFileHandle(`heubestellung_${new Date().toISOString().slice(0,10)}.json`, {create:true});
  const w = await fh.createWritable({keepExistingData:false});
  await w.write(JSON.stringify({customers:state.customers,reservations:state.reservations,fields:state.fields,workLogs:state.workLogs,harvests:state.harvests,hallSlots:state.hallSlots},null,2));
  await w.close();
}
async function loadAndRestoreBackup() {
  if (!backupHandle) return;
  try {
    if ((await backupHandle.queryPermission({mode:'read'})) !== 'granted')
      if ((await backupHandle.requestPermission({mode:'read'})) !== 'granted') return;
    const entries = []; for await (const e of backupHandle.values()) entries.push(e);
    const backups = entries.filter(e => e.kind === 'file' && e.name.startsWith('heubestellung_') && e.name.endsWith('.json')).sort((a, b) => b.name.localeCompare(a.name));
    if (backups.length === 0) { showToast('Keine Backup-Dateien gefunden'); return; }
    const file = await backups[0].getFile();
    const text = await file.text();
    const data = JSON.parse(text);
    if (!data.customers && !data.fields) { showToast('Ungültige Backup-Datei'); return; }
    state.customers = (data.customers || []).map(c => { if (!c.location) c.location = ''; if (c.deliveryCost === undefined) c.deliveryCost = 0; return c; });
    state.reservations = (data.reservations || []).map(r => { if (!r.year) r.year = CURRENT_YEAR; return r; });
    state.fields = data.fields || [];
    state.workLogs = data.workLogs || [];
    state.harvests = data.harvests || [];
    state.hallSlots = data.hallSlots || {};
    state.currentCustomerId = null;
    state.currentFieldId = null;
    saveData(); renderAll(); showToast('Backup wiederhergestellt: ' + backups[0].name);
  } catch(e) { showToast('Fehler: ' + e.message); }
}
async function refreshBackupPermission() {
  if (!backupHandle) return;
  try {
    const result = await backupHandle.requestPermission({mode:'readwrite'});
    if (result === 'granted') { showToast('Berechtigung erneuert'); renderSidebar(); }
    else showToast('Berechtigung verweigert');
  } catch(e) { showToast('Fehler'); }
}

// ============ INIT ============
loadData();
if (state.customers.length === 0 && state.reservations.length === 0) {
  state.customers = JSON.parse(JSON.stringify(DEFAULT_DATA.customers));
  state.reservations = JSON.parse(JSON.stringify(DEFAULT_DATA.reservations));
  saveData();
}
if (state.fields.length === 0 && DEFAULT_FIELDS.length > 0) { state.fields = JSON.parse(JSON.stringify(DEFAULT_FIELDS)); saveData(); }
checkPINStatus();
loadBackupHandle().then(h => { backupHandle = h; renderSidebar(); });
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js', { scope: './' }).catch(()=>{});
}
// Start pending sync polling on PC
startPendingSyncPolling();
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  const btn = document.getElementById('installBtn');
  if (btn) btn.style.display = 'flex';
});
function installPWA() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(result => {
      if (result.outcome === 'accepted') showToast('App installiert');
      deferredPrompt = null;
    });
    return;
  }
  showModal(`
    <h3 style="margin-bottom:12px;">App auf dem Handy installieren</h3>
    <ol style="text-align:left;line-height:1.8;padding-left:20px;">
      <li>Chrome-Menü öffnen (⋮)</li>
      <li><b>"App installieren"</b> oder <b>"Zum Startbildschirm"</b> wählen</li>
      <li>App öffnet sich wie eine normale App</li>
      <li>Funktioniert auch <b>ohne PC</b> (Offline)</li>
    </ol>
    <p style="margin-top:16px;color:var(--text-light);font-size:0.9rem;">Nach der Installation über das App-Icon öffnen, nicht über den Browser.</p>
    <button class="btn btn-primary" onclick="closeModal()" style="margin-top:16px;">OK</button>
  `);
}
